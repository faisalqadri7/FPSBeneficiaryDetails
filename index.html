<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#090d10" />
    <meta name="application-name" content="Ration Card Details" />
    <meta name="apple-mobile-web-app-title" content="Ration Card Details" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Village Wise FPS Beneficiary Details</title>
    <link rel="icon" href="assets/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="assets/favicon-48x48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <div class="brand-lockup">
          <img
            class="brand-logo"
            src="assets/logo-256.png"
            width="96"
            height="96"
            alt="Ration Card Details logo"
          />
          <div>
            <p class="eyebrow">Fair Price Shop Beneficiary Register</p>
            <h1>Village Wise Beneficiary Details</h1>
          </div>
        </div>
        <div class="source-pill" aria-label="Data source">
          <span>Source</span>
          <strong>Excel workbook</strong>
        </div>
      </header>

      <section class="layout" aria-label="Village wise beneficiary dashboard">
        <section class="content-panel" aria-live="polite">
          <div class="content-top">
            <div>
              <p class="eyebrow">Current Village</p>
              <h2 id="activeVillageName">Balapora</h2>
              <p id="activeVillageNote" class="muted">Loading village data...</p>
            </div>
            <span id="statusMessage" class="status">Loading Excel file...</span>
          </div>

          <div id="summaryGrid" class="summary-grid"></div>

          <div class="filters advanced-filters" aria-label="Advanced village filters">
            <label class="field narrow">
              <span>S.No.</span>
              <input id="serialSearch" type="search" inputmode="numeric" placeholder="1" autocomplete="off" />
            </label>

            <label class="field">
              <span>Ration Card No.</span>
              <input
                id="rationCardSearch"
                type="search"
                inputmode="numeric"
                placeholder="Card no."
                autocomplete="off"
              />
            </label>

            <label class="field">
              <span>Family Head</span>
              <input id="familyHeadSearch" type="search" placeholder="Head" autocomplete="off" />
            </label>

            <label class="field">
              <span>Member Name</span>
              <input id="memberNameSearch" type="search" placeholder="Name" autocomplete="off" />
            </label>

            <label class="field narrow">
              <span>UID Last 4</span>
              <input
                id="uidLast4Search"
                type="search"
                inputmode="numeric"
                maxlength="4"
                placeholder="5296"
                autocomplete="off"
              />
            </label>

            <label class="field compact">
              <span>Village</span>
              <select id="villageFilter">
                <option value="">Loading...</option>
              </select>
            </label>

            <label class="field compact">
              <span>Scheme</span>
              <select id="schemeFilter">
                <option value="">All schemes</option>
              </select>
            </label>

            <label class="field compact">
              <span>FPS</span>
              <select id="fpsFilter">
                <option value="">All FPS</option>
              </select>
            </label>

            <button id="clearSearchButton" class="clear-filters" type="button">Clear</button>
          </div>

          <div class="table-meta">
            <strong id="rowCount">0 records</strong>
            <span id="filterHint">Village wise records will appear below.</span>
          </div>

          <div class="table-wrap" role="region" aria-label="Village beneficiary table" tabindex="0">
            <table id="dataTable">
              <thead></thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
